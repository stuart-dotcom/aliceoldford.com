# ============================================================
# _config.yml — Site-wide configuration
# All SEO defaults, schema seeds, and nav live here.
# Change these once; they propagate everywhere via layout.
# ============================================================

# --- Core Identity ---
title:       "Alice Oldford"
tagline:     "Author · Real Estate Professional"
description: "Official website of Alice Oldford — novelist, memoirist, and licensed real estate professional serving the Lake Placid area."
url:     "https://aliceoldford.com"
baseurl: ""

# --- Author / Person Schema ---
author:
  name:  "Alice Oldford"
  email: "aoldford@yahoo.com"
  phone: "+1-863-273-2166"
  social:
    - https://www.facebook.com/aliceoldfordrealtor/
    - https://www.linkedin.com/in/alice-oldford-71170519/

# --- Organization / Brand Schema ---
organization:
  name: "Alice Oldford"
  type: "Person"
  logo: "/assets/images/Tourism_Ambassador.jpg"

# --- Default OG image (used when pages don't specify og_image) ---
og_image_default: "/assets/images/hero-home.jpg"

# --- Navigation (order controls menu order) ---
nav:
  - label: "Home"
    url:   "/"
  - label: "Books"
    url:   "/books/"
  - label: "Real Estate"
    url:   "/realestate/"
  - label: "Pictures & Links"
    url:   "/pictures/"
  - label: "Events"
    url:   "/events/"
  - label: "Contact"
    url:   "/contact/"
  - label: "Archive"
    url:   "/archive/"

# --- Build settings ---
markdown:  kramdown
permalink: pretty
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
