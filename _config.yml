# ============================================================
# _config.yml — Site-wide configuration
# All SEO defaults, schema seeds, and nav live here.
# Change these once; they propagate everywhere via layout.
# ============================================================

# --- Core Identity ---
title:       "Alice Oldford"
tagline:     "Author · Real Estate Professional"
description: "Official website of Alice Oldford — novelist, memoirist, and licensed real estate professional serving the Lake Placid area."
url:     "https://stuart-dotcom.github.io"
baseurl: "/aliceoldford.com"

# --- Author / Person Schema ---
author:
  name:  "Alice Oldford"
  email: "aoldford@yahoo.com"
  phone: ""
  social:
    - https://www.facebook.com/aliceoldford

# --- Organization / Brand Schema ---
organization:
  name: "Alice Oldford"
  type: "Person"
  logo: "/assets/images/logo.png"

# --- Navigation (order controls menu order) ---
nav:
  - label: "Home"
    url:   "/"
  - label: "Books"
    url:   "/books/"
  - label: "Real Estate"
    url:   "/realestate/"
  - label: "Pictures & Links"
    url:   "/pictures/"
  - label: "Events"
    url:   "/events/"
  - label: "Contact"
    url:   "/contact/"
  - label: "Archive"
    url:   "/archive/"

# --- Build settings ---
markdown:  kramdown
permalink: pretty
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
