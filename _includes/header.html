<header class="site-header" role="banner">
  <div class="container site-header__inner">

    <a class="site-header__logo" href="{{ site.baseurl }}/"
       aria-label="{{ site.author.name }} &mdash; Home">
      <svg class="logo-mark" width="36" height="36" viewBox="0 0 36 36"
           fill="none" aria-hidden="true" focusable="false">
        <circle cx="14" cy="18" r="10" stroke="currentColor" stroke-width="2.5" fill="none"/>
        <circle cx="22" cy="18" r="10" stroke="currentColor" stroke-width="2.5" fill="none"
                stroke-dasharray="20 43"/>
      </svg>
      <span class="logo-name">{{ site.author.name }}</span>
    </a>

    {% include nav.html %}

    <button class="theme-toggle" data-theme-toggle
            aria-label="Switch to dark mode"
            title="Toggle dark/light mode">
    </button>

  </div>
</header>
