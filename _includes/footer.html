<footer class="site-footer" role="contentinfo">
  <div class="container site-footer__inner">

    <div class="site-footer__identity">
      <strong class="site-footer__name">{{ site.author.name }}</strong>
      <p class="site-footer__tagline">{{ site.tagline }}</p>
    </div>

    <nav class="site-footer__nav" aria-label="Footer navigation">
      <ul role="list">
        {% for item in site.nav %}
          <li><a href="{{ site.baseurl }}{{ item.url }}">{{ item.label }}</a></li>
        {% endfor %}
      </ul>
    </nav>

    <div class="site-footer__bottom">
      <p class="site-footer__copy">
        &copy; {{ "now" | date: "%Y" }} {{ site.author.name }}. All rights reserved.
      </p>
      <p class="site-footer__credit">
        <span class="site-footer__credit-label">Site by</span>
        <a
          href="https://obsidianpeakholdingsllc.com"
          class="site-footer__credit-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Website designed and built by Obsidian Peak Holdings"
        >
          <img
            src="{{ site.baseurl }}/assets/images/Obsidian_Peak_Logo_Footer.png"
            alt="Obsidian Peak Holdings"
            width="120"
            height="40"
            loading="lazy"
            decoding="async"
            class="site-footer__credit-logo"
          >
        </a>
      </p>
    </div>

  </div>
</footer>
