<footer class="site-footer" role="contentinfo">
  <div class="container site-footer__inner">

    <div class="site-footer__identity">
      <strong class="site-footer__name">{{ site.author.name }}</strong>
      <p class="site-footer__tagline">{{ site.tagline }}</p>

      <!-- Social icons -->
      <ul class="site-footer__social" role="list" aria-label="Social media links">
        <li>
          <a href="https://www.facebook.com/aliceoldfordrealtor/"
             target="_blank"
             rel="noopener noreferrer"
             aria-label="Alice Oldford on Facebook"
             class="site-footer__social-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
              <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.874v2.25h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
            </svg>
          </a>
        </li>
        <li>
          <a href="https://www.linkedin.com/in/alice-oldford-71170519/"
             target="_blank"
             rel="noopener noreferrer"
             aria-label="Alice Oldford on LinkedIn"
             class="site-footer__social-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true" focusable="false">
              <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
            </svg>
          </a>
        </li>
      </ul>
    </div>

    <nav class="site-footer__nav" aria-label="Footer navigation">
      <ul role="list">
        {% for item in site.nav %}
          <li><a href="{{ site.baseurl }}{{ item.url }}">{{ item.label }}</a></li>
        {% endfor %}
      </ul>
    </nav>

    <div class="site-footer__bottom">
      <p class="site-footer__copy">
        &copy; {{ "now" | date: "%Y" }} {{ site.author.name }}. All rights reserved.
      </p>

      <!-- Site credit: text label + rounded logo pill -->
      <div class="site-footer__credit">
        <span class="site-footer__credit-label">Site by &mdash; Obsidian Peak Holdings LLC</span>
        <a
          href="https://obsidianpeakholdingsllc.com"
          class="site-footer__credit-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Visit Obsidian Peak Holdings LLC"
        >
          <span class="site-footer__credit-logo-wrap">
            <picture>
              <source srcset="{{ site.baseurl }}/assets/images/Obsidian_Peak_Logo_Footer.webp" type="image/webp">
              <img
                src="{{ site.baseurl }}/assets/images/Obsidian_Peak_Logo_Footer.png"
                alt="Obsidian Peak Holdings LLC logo"
                width="300"
                height="150"
                loading="lazy"
                decoding="async"
                class="site-footer__credit-logo"
              >
            </picture>
          </span>
        </a>
      </div>

    </div>

  </div>
</footer>
